<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO Game</title>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
    }

    body{
        height: 100vh;
        background: linear-gradient(135deg, #1e1e2f, #2a2a40);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .game{
        width: 360px;
        padding: 20px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        text-align: center;
    }

    .title{
        grid-column: span 3;
        padding: 18px 0;
        background: #7a5cff;
        color: #fff;
        font-size: 28px;
        font-weight: 700;
        border-radius: 12px;
        letter-spacing: 2px;
        margin-bottom: 10px;
        box-shadow: 0 4px 12px rgba(122,92,255,0.5);
    }

    .btn {
        grid-column: span 3;
        height: 50px;
        background: #2f2f45;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .btn:hover {
        background: #3b3b55;
        transform: translateY(-3px);
        box-shadow: 0 8px 18px rgba(0,0,0,0.4);
    }

 
    #pvc-toggle {
        display: none;
    }


    .buttons {
        display: grid;
        grid-column: span 3;
        gap: 12px;
    }

  
    #pvc-toggle:checked ~ .buttons {
        display: none;
    }

    .difficulty {
        display: none;
        grid-column: span 3;
        gap: 10px;
        margin-top: 10px;
    }

    #pvc-toggle:checked ~ .difficulty {
        display: grid;
    }

    
a {
    text-decoration: none; 
    display: grid; 
    grid-column: span 3;
}

a .btn {
    width: 100%;
    height: 50px;
    background: #2f2f45;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

a .btn:hover {
    background: #3b3b55;
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.4);
}


</style>
</head>
<body>
<div class="game">
    <div class="title">Welcome to XO Game</div>

    <input type="checkbox" id="pvc-toggle">

    <div class="buttons">
        <a href="PVP.html"><div class="btn">PVP</div></a>
        <label class="btn" for="pvc-toggle" onclick="choose()">PVC</label>
    </div>

    <div class="difficulty">
        <a href="PVCeasy.HTML"><div class="btn">Easy</div></a>
        <a href="PVCmiddle.html"><div class="btn">Middle</div></a>
        <a href="PVCinposible.html"><div class="btn">hard</div></a>
        <div class="btn">Impossible</div>
    </div>
</div>
</body>
<script>
    let title = document.querySelector(".title");
    function choose(){
        title.innerHTML= 'choose the level in PVC';
    }
</script>

</html>
