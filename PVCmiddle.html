<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC</title>
    <link rel="stylesheet" href="XO.CSS">
</head>
<body>
    <div class="reload" onclick="repeat()"></div>
    <a href="XO.html"><div class="home" ></div></a>
    <div class="game">
        <div class="title"><span>X O</span> GAME</div>

        <div class="square" id="item1" onclick="game(this.id)"></div>
        <div class="square" id="item2" onclick="game(this.id)"></div>
        <div class="square" id="item3" onclick="game(this.id)"></div>

        <div class="square" id="item4" onclick="game(this.id)"></div>
        <div class="square" id="item5" onclick="game(this.id)"></div>
        <div class="square" id="item6" onclick="game(this.id)"></div>

        <div class="square" id="item7" onclick="game(this.id)"></div>
        <div class="square" id="item8" onclick="game(this.id)"></div>
        <div class="square" id="item9" onclick="game(this.id)"></div>

    </div>
    
</body>
<script>
    let title =document.querySelector(".title");
    let turn = 'x';
    let square= [];

    function end(num1,num2,num3){
            title.innerHTML = `${square[num1]} winner`;
            title.style.backgroundColor= "green";
            document.getElementById('item' +num1).style.backgroundColor= "green";
            document.getElementById('item' +num2).style.backgroundColor= "green";
            document.getElementById('item' +num3).style.backgroundColor= "green";
    }

    function winner(){
        for(let i=1;i<10;i++){
            square[i]=document.getElementById('item' +i).innerHTML;
        }

        if(square[1] == square[2] && square[2] == square[3] && square[1] !=''){
            end(1,2,3);
        }
        if(square[4] == square[5] && square[5] == square[6] && square[5] !=''){
            end(4,5,6);
        }
        if(square[7] == square[8] && square[8] == square[9] && square[9] !=''){
            end(7,8,9);
        }


        if(square[1] == square[4] && square[4] == square[7] && square[7] !=''){
            end(1,4,7);
        }
        if(square[2] == square[5] && square[5] == square[8] && square[5] !=''){
            end(2,5,8);
        }
        if(square[3] == square[6] && square[6] == square[9] && square[6] !=''){
            end(3,6,9);
        }


        if(square[1] == square[5] && square[5] == square[9] && square[1] !=''){
            end(1,5,9);
        }
        if(square[3] == square[5] && square[5] == square[7] && square[7] !=''){
            end(3,5,7);
        }
    }

    function game(id){
        let element = document.getElementById(id);
        
        if(turn === 'x' && element.innerHTML == '' ){
            element.innerHTML = 'X';
            turn = 'o';
            title.innerHTML = 'O';
        }
        setTimeout(Cmiddle, 500);
        winner();
    } 

    function Cmiddle() {
  if (turn !== 'o') return; 

  let board = ['', '', '', '', '', '', '', '', ''];

  const lines = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8],
    [0, 3, 6], [1, 4, 7], [2, 5, 8],
    [0, 4, 8], [2, 4, 6]
  ];

  function updateBoard() {
    for (let i = 0; i < 9; i++) {
      board[i] = document.getElementById('item' + (i + 1)).innerHTML;
    }
  }

  function computerMove() {
    updateBoard();

    
    for (let line of lines) {
      let [a, b, c] = line;
      let values = [board[a], board[b], board[c]];
      if (values.filter(v => v === 'O').length === 2 && values.includes('')) {
        let index = line[values.indexOf('')];
        playSquare(index, 'O');
        return;
      }
    }

    
    for (let line of lines) {
      let [a, b, c] = line;
      let values = [board[a], board[b], board[c]];
      if (values.filter(v => v === 'X').length === 2 && values.includes('')) {
        let index = line[values.indexOf('')];
        playSquare(index, 'O');
        return;
      }
    }

    
    let available = [];
    for(let i=1; i<=9; i++){
        let el = document.getElementById('item' + i);
        if(el.innerHTML === ''){
            available.push(el);
        }
    }

    if(available.length === 0) return; 

    let element2 = available[Math.floor(Math.random() * available.length)];
    element2.innerHTML = 'O';
    turn = 'x';
    title.innerHTML = 'X';
    winner();
    
  }

  function playSquare(index, symbol) {
    document.getElementById('item' + (index + 1)).innerHTML = symbol;
    board[index] = symbol;
    winner();
    turn = 'x'; 
    title.innerHTML = 'X';
  }

  
  computerMove();
}



    

    function repeat(){
        location.reload();
    }

</script>
</html>
